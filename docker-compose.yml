name: carqrcode

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build:
      context: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PUBLIC_CARD_BASE_URL: https://carqrcode.ir
      OTP_TTL_MINUTES: ${OTP_TTL_MINUTES:-1440}
      OTP_MAX_USES: ${OTP_MAX_USES:-10}
      LOGIN_OTP_TTL_MINUTES: ${LOGIN_OTP_TTL_MINUTES:-10}
      SERVICE_SESSION_EXPIRES_IN: ${SERVICE_SESSION_EXPIRES_IN:-24h}
      SERVICE_CREDIT_COST: ${SERVICE_CREDIT_COST:-1}
      ADMIN_NAME: ${ADMIN_NAME}
      ADMIN_MOBILE: ${ADMIN_MOBILE}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - internal

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
        NEXT_PUBLIC_FRONTEND_BASE_URL: https://carqrcode.ir
        NEXT_PUBLIC_COMPANY_NAME: ${NEXT_PUBLIC_COMPANY_NAME}
        NEXT_PUBLIC_SUPPORT_PHONE: ${NEXT_PUBLIC_SUPPORT_PHONE}
        NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3005/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
    networks:
      - internal

  certbot:
    image: certbot/certbot:latest
    profiles: ["tools"]
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

volumes:
  postgres_data:
  certbot_www:
  letsencrypt:

networks:
  internal:
    driver: bridge
